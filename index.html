document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle=\"font-size:12px;font-weight:700;color:#1E56E3;letter-spacing:.04em\">{{ post.tag }}<\u002Fspan>\n              <h3 style=\"font-family:'Lora',serif;font-size:19px;font-weight:700;margin-top:8px;color:#0B1E3F;line-height:1.3\">{{ post.title }}<\u002Fh3>\n              <p style=\"margin-top:9px;font-size:14px;color:#55617A\">{{ post.excerpt }}<\u002Fp>\n              <div style=\"margin-top:14px;display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:12.5px;color:#8593AD\">{{ post.date }}<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:#1E56E3\">Đọc tiếp →<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- TEACHERS -->\n    <section id=\"teachers\" style=\"background:#fff;border-top:1px solid #E4EAF3;scroll-margin-top:80px\">\n      <div style=\"max-width:1180px;margin:0 auto;padding:88px 24px\">\n        <div style=\"text-align:center;max-width:660px;margin:0 auto\">\n          <span style=\"font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1E56E3\">Đội ngũ giảng viên<\u002Fspan>\n          <h2 style=\"font-family:'Lora',serif;font-size:40px;font-weight:700;margin-top:12px;letter-spacing:-.5px;color:#0B1E3F\">Người trực tiếp đồng hành cùng học viên<\u002Fh2>\n          <p style=\"margin-top:14px;font-size:17px;color:#55617A\">Giảng viên giàu kinh nghiệm thực chiến, tận tâm với từng học viên trong mỗi buổi học.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"margin-top:48px;display:flex;flex-wrap:wrap;justify-content:center;gap:26px\">\n          <sc-for list=\"{{ teachers }}\" as=\"t\" hint-placeholder-count=\"1\">\n            <div style=\"width:420px;max-width:100%;background:#F8FAFE;border:1px solid #E4EAF3;border-radius:22px;padding:34px 32px;box-shadow:0 1px 3px rgba(16,42,76,.05);display:flex;flex-direction:column;align-items:center;text-align:center\">\n              <div style=\"position:relative;width:108px;height:108px;margin-bottom:8px\">\n                <div style=\"width:108px;height:108px;border-radius:50%;background:linear-gradient(135deg,#2E6BFF,#1746C4);display:flex;align-items:center;justify-content:center;font-family:'Lora',serif;font-weight:700;font-size:40px;color:#fff;box-shadow:0 14px 30px rgba(30,86,227,.38)\">{{ t.initials }}<\u002Fdiv>\n                <span style=\"position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);background:#1E9E6A;color:#fff;font-size:11.5px;font-weight:700;padding:4px 12px;border-radius:100px;white-space:nowrap;box-shadow:0 6px 14px rgba(30,158,106,.4)\">{{ t.exp }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:'Lora',serif;font-size:24px;font-weight:700;margin-top:14px;color:#0B1E3F\">{{ t.name }}<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:600;color:#1E56E3;margin-top:4px\">{{ t.role }}<\u002Fdiv>\n              <div style=\"margin-top:18px;display:flex;flex-direction:column;gap:9px;align-items:flex-start;width:100%;max-width:300px;margin-left:auto;margin-right:auto\">\n                <sc-for list=\"{{ t.creds }}\" as=\"cr\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;gap:11px;align-items:center;font-size:14.5px;color:#46536E\"><span style=\"font-size:17px\">{{ cr.icon }}<\u002Fspan><span>{{ cr.text }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <p style=\"margin-top:20px;font-size:14.5px;color:#55617A;line-height:1.6;border-top:1px solid #E9EEF6;padding-top:18px\">{{ t.bio }}<\u002Fp>\n              <div style=\"margin-top:18px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center\">\n                <sc-for list=\"{{ t.tags }}\" as=\"tg\" hint-placeholder-count=\"4\">\n                  <span style=\"padding:6px 13px;border-radius:100px;background:#EAF0FE;color:#1E56E3;font-size:12.5px;font-weight:600\">{{ tg }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CTA -->\n    <section style=\"max-width:1180px;margin:0 auto;padding:0 24px 92px\">\n      <div style=\"background:linear-gradient(120deg,#1E56E3,#1746C4);border-radius:26px;padding:60px 56px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap;box-shadow:0 30px 60px rgba(30,86,227,.32);position:relative;overflow:hidden\">\n        <div style=\"position:absolute;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.12) 1px,transparent 0);background-size:24px 24px\"><\u002Fdiv>\n        <div style=\"position:relative;max-width:560px\">\n          <h2 style=\"font-family:'Lora',serif;font-size:36px;font-weight:700;letter-spacing:-.5px\">Đăng ký học thử miễn phí<\u002Fh2>\n          <p style=\"margin-top:12px;font-size:17px;color:#D9E3FB\">Trải nghiệm 1 buổi học cùng giảng viên tại Nhật Minh Academy.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ goRegister }}\" style=\"position:relative;padding:17px 32px;border-radius:13px;background:#fff;color:#1E56E3;font-weight:700;font-size:17px;white-space:nowrap;box-shadow:0 12px 28px rgba(0,0,0,.18)\" style-hover=\"transform:translateY(-2px)\">Đăng ký ngay →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ ROADMAP PAGE ============ -->\n  <sc-if value=\"{{ isRoadmap }}\" hint-placeholder-val=\"{{ true }}\">\n  <main>\n    <section style=\"background:#0B1E3F;color:#fff\">\n      <div style=\"max-width:1180px;margin:0 auto;padding:64px 24px 70px\">\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#6FA0FF\">Lộ trình học<\u002Fspan>\n        <h1 style=\"font-family:'Lora',serif;font-size:46px;font-weight:700;margin-top:12px;letter-spacing:-.5px;max-width:760px;line-height:1.12\">Chương trình IT bám sát từng cấp lớp<\u002Fh1>\n        <p style=\"margin-top:16px;font-size:17.5px;color:#B3C0D8;max-width:680px\">Từ những thao tác máy tính đầu tiên ở tiểu học đến kỹ năng đi làm thực chiến — mỗi giai đoạn được thiết kế để kế thừa và phát triển từ giai đoạn trước.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"max-width:1100px;margin:0 auto;padding:70px 24px 90px\">\n      <div style=\"display:flex;flex-direction:column;gap:30px\">\n        <sc-for list=\"{{ levels }}\" as=\"lv\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid #E4EAF3;border-radius:22px;overflow:hidden;box-shadow:0 1px 3px rgba(16,42,76,.05);display:grid;grid-template-columns:300px 1fr\">\n            <div style=\"padding:34px 30px;background:{{ lv.tint }};display:flex;flex-direction:column;justify-content:space-between\">\n              <div>\n                <div style=\"display:flex;align-items:center;gap:13px\">\n                  <span style=\"width:54px;height:54px;border-radius:14px;background:#fff;color:{{ lv.color }};display:flex;align-items:center;justify-content:center;font-size:27px;box-shadow:0 4px 12px rgba(16,42,76,.1)\">{{ lv.icon }}<\u002Fspan>\n                  <span style=\"font-family:'Lora',serif;font-size:40px;font-weight:700;color:{{ lv.color }};opacity:.5\">{{ lv.step }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"margin-top:20px;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:{{ lv.color }}\">{{ lv.grades }}<\u002Fdiv>\n                <div style=\"font-family:'Lora',serif;font-size:26px;font-weight:700;margin-top:4px;color:#0B1E3F\">{{ lv.tag }}<\u002Fdiv>\n                <p style=\"margin-top:12px;font-size:14.5px;color:#46536E;line-height:1.6\">{{ lv.short }}<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"margin-top:24px;padding-top:18px;border-top:1px solid rgba(11,30,63,.1);font-size:13.5px;color:#46536E\"><b style=\"color:#0B1E3F\">Mục tiêu:<\u002Fb> {{ lv.goal }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:34px 34px 38px\">\n              <div style=\"font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8593AD\">Nội dung học<\u002Fdiv>\n              <div style=\"margin-top:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px 26px\">\n                <sc-for list=\"{{ lv.topics }}\" as=\"tp\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;gap:12px;align-items:flex-start\">\n                    <span style=\"flex:none;width:26px;height:26px;border-radius:8px;background:{{ lv.tint }};color:{{ lv.color }};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700\">{{ tp.n }}<\u002Fspan>\n                    <div>\n                      <div style=\"font-weight:600;font-size:14.5px;color:#0B1E3F\">{{ tp.title }}<\u002Fdiv>\n                      <div style=\"font-size:13px;color:#6A7794;margin-top:2px\">{{ tp.note }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button onclick=\"{{ lv.open }}\" style=\"margin-top:26px;padding:11px 20px;border-radius:10px;background:{{ lv.tint }};color:{{ lv.color }};font-weight:700;font-size:14px\" style-hover=\"opacity:.85\">Xem khóa học cấp này →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ============ COURSES LIST PAGE ============ -->\n  <sc-if value=\"{{ isCourses }}\" hint-placeholder-val=\"{{ true }}\">\n  <main>\n    <section style=\"background:#fff;border-bottom:1px solid #E4EAF3\">\n      <div style=\"max-width:1180px;margin:0 auto;padding:56px 24px 40px\">\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#1E56E3\">Khóa học<\u002Fspan>\n        <h1 style=\"font-family:'Lora',serif;font-size:44px;font-weight:700;margin-top:12px;letter-spacing:-.5px;color:#0B1E3F\">Tất cả khóa học tại Nhật Minh<\u002Fh1>\n        <p style=\"margin-top:14px;font-size:17px;color:#55617A;max-width:640px\">Lọc theo cấp học để tìm khóa phù hợp với con bạn hoặc với mục tiêu nghề nghiệp của bạn.<\u002Fp>\n        <div style=\"margin-top:28px;display:flex;gap:10px;flex-wrap:wrap\">\n          <sc-for list=\"{{ filters }}\" as=\"ft\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ ft.set }}\" style=\"padding:10px 18px;border-radius:100px;font-size:14px;font-weight:600;border:1px solid {{ ft.border }};background:{{ ft.bg }};color:{{ ft.ink }}\" style-hover=\"border-color:#1E56E3\">{{ ft.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"max-width:1180px;margin:0 auto;padding:44px 24px 90px\">\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n        <sc-for list=\"{{ filteredCourses }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ c.open }}\" style=\"text-align:left;background:#fff;border:1px solid #E4EAF3;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(16,42,76,.05);transition:transform .18s,box-shadow .18s\" style-hover=\"transform:translateY(-4px);box-shadow:0 18px 34px rgba(16,42,76,.1)\">\n            <div style=\"height:140px;background:{{ c.tint }};display:flex;align-items:center;justify-content:center;position:relative\">\n              <span style=\"font-size:48px\">{{ c.icon }}<\u002Fspan>\n              <span style=\"position:absolute;top:13px;left:13px;padding:5px 11px;border-radius:7px;background:rgba(255,255,255,.85);font-size:11.5px;font-weight:700;color:{{ c.color }}\">{{ c.levelTag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:20px 20px 22px;display:flex;flex-directi -height:1.6;max-width:300px\">Học viện công nghệ dành cho học sinh và người đi làm — đào tạo IT bài bản theo từng cấp độ.<\u002Fp>\n          <div style=\"margin-top:18px;display:flex;gap:10px\">\n            <sc-for list=\"{{ socials }}\" as=\"sc\" hint-placeholder-count=\"3\">\n              <a href=\"{{ sc.href }}\" target=\"_blank\" title=\"{{ sc.label }}\" style=\"width:40px;height:40px;border-radius:11px;background:{{ sc.color }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px\" style-hover=\"opacity:.85\">{{ sc.icon }}<\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-weight:700;color:#fff;font-size:14px;margin-bottom:14px\">Chương trình<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\">\n            <button onclick=\"{{ goRoadmap }}\" style=\"text-align:left;color:#9DAFCC\" style-hover=\"color:#fff\">Lộ trình học<\u002Fbutton>\n            <button onclick=\"{{ goCourses }}\" style=\"text-align:left;color:#9DAFCC\" style-hover=\"color:#fff\">Khóa học<\u002Fbutton>\n            <button onclick=\"{{ goPricing }}\" style=\"text-align:left;color:#9DAFCC\" style-hover=\"color:#fff\">Học phí<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-weight:700;color:#fff;font-size:14px;margin-bottom:14px\">Khám phá<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\">\n            <button onclick=\"{{ goTeachers }}\" style=\"text-align:left;color:#9DAFCC\" style-hover=\"color:#fff\">Giáo viên<\u002Fbutton>\n            <button onclick=\"{{ goBlog }}\" style=\"text-align:left;color:#9DAFCC\" style-hover=\"color:#fff\">Blog &amp; Tin tức<\u002Fbutton>\n            <button onclick=\"{{ goRegister }}\" style=\"text-align:left;color:#9DAFCC\" style-hover=\"color:#fff\">Đăng ký học thử<\u002Fbutton>\n          <\u002Fdiv>\n        <\u0
